hero:
  heading: Business accommodation you can rely on
  subheading: >-
    South Africa's curated platform for vetted guesthouses, boutique hotels and
    executive stays — built around the way business travellers actually work.
  image: ../../assets/images/pages/hero/image.jpg
  overlayOpacity: 65
founderStrip:
  heading: Personally vetted, personally accountable
  body: >-
    Every property on Acosa has been assessed by our team against the Business
    Traveller Essentials framework. If it's listed, it works — reliable WiFi,
    backup power, secure parking and a proper place to work.
  image: ../../assets/images/pages/founderStrip/image.jpg
trustStrip:
  - icon: briefcase-business
    title: Curated for Business
    detail: Every stay is chosen for business travellers.
  - icon: shield
    title: Quality You Can Trust
    detail: We check for reliability, safety, amenities.
  - icon: map-pin
    title: Key Business Locations
    detail: Stay close to where business happens.
  - icon: life-buoy
    title: Support Local
    detail: Supporting Independent Hosts.
whyAcosaPreview:
  heading: Why Acosa?
  body: >-
    Generic booking sites optimise for holidays. Acosa optimises for
    Monday-morning meetings, load-shedding schedules and six-week project stays.
vettingScorecard:
  headlineScore: 92
  criteria:
    - label: Operational Reliability
      score: 96
    - label: Business Usability
      score: 92
    - label: Infrastructure
      score: 88
    - label: Guest Responsiveness
      score: 94
  footnote: >-
    Properties are scored by our operational assessment team. Only
    properties meeting the threshold earn the Acosa Approved™ badge.
ownerCta:
  heading: Own a guesthouse or executive stay?
  body: >-
    List your property on Acosa and connect with South Africa's professional
    corporate travellers.
  buttonLabel: List Your Property
seo:
  title: Acosa | Vetted Business Accommodation in South Africa
  description: >-
    Find vetted business accommodation in South Africa's key business nodes.
    Guesthouses, boutique hotels and executive stays that meet the Business
    Traveller Essentials standard.
